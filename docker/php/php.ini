; Configuración PHP para TecnoSoluciones S.A.
; ============================================

; Zona horaria
date.timezone = America/Lima

; Límites de memoria y ejecución
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; Tamaño máximo de archivos
upload_max_filesize = 64M
post_max_size = 64M

; Configuración de sesiones (seguridad)
session.cookie_httponly = 1
session.use_only_cookies = 1
session.cookie_secure = 0  ; Cambiar a 1 si usas HTTPS
session.gc_maxlifetime = 3600

; Errores (cambiar en producción)
display_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php_errors.log

; Configuración PDO
pdo_mysql.default_socket = /var/run/mysqld/mysqld.sock

; Extensiones cargadas automáticamente
extension=pdo
extension=pdo_mysql
extension=mysqli
