
services:
  # ============================================
  # Servicio PHP + Apache
  # ============================================
  php-apache:
    image: php:8.2-apache
    container_name: tecnosoluciones-php
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
      - composer_cache:/root/.composer
    depends_on:
      - mariadb
    networks:
      - tecno-network
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
    

  # ============================================
  # Servicio MariaDB
  # ============================================
  mariadb:
    image: mariadb:11.4
    container_name: tecnosoluciones-mariadb
    restart: unless-stopped
    ports:
      - target: 3306
        published: 3307
        protocol: tcp
        mode: host
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: tecnosoluciones_db
      MARIADB_USER: tecno_user
      MARIADB_PASSWORD: tecno_pass
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - tecno-network
    command: 
      mariadbd
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  # ============================================
  # Servicio phpMyAdmin
  # ============================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: tecnosoluciones-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      - mariadb
    networks:
      - tecno-network

# ============================================
# Volúmenes persistentes
# ============================================
volumes:
  mariadb_data:
    driver: local
  composer_cache:
    driver: local

# ============================================
# Red compartida entre contenedores
# ============================================
networks:
  tecno-network:
    driver: bridge
